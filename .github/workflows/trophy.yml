name: generate trophies

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate trophy.svg
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          output_path: trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect trophy.svg into dist
        run: |
          mkdir -p dist
          echo "Searching for generated SVG..."
          if [ -f trophy.svg ]; then
            mv trophy.svg dist/trophy.svg
          else
            FOUND=$(find . -name "trophy.svg" -not -path "./dist/*" | head -n 1)
            if [ -n "$FOUND" ]; then
              mv "$FOUND" dist/trophy.svg
            else
              echo "ERROR: trophy.svg was not generated. Listing workspace:"
              find . -maxdepth 3 -name "*.svg"
              exit 1
            fi
          fi
          ls -la dist

      # keep_history: true is REQUIRED so this push does not delete
      # the Pac-Man SVG that lives on the same output branch
      - name: Push trophy.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
