name: generate profile assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Safety net: if two runs ever overlap, queue them instead of racing
    concurrency:
      group: output-branch
      cancel-in-progress: false

    steps:
      - name: Generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Generate trophy.svg
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          output_path: trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect trophy.svg into dist
        run: |
          mkdir -p dist
          if [ -f trophy.svg ]; then
            mv trophy.svg dist/trophy.svg
          else
            FOUND=$(find . -name "trophy.svg" -not -path "./dist/*" | head -n 1)
            if [ -n "$FOUND" ]; then
              mv "$FOUND" dist/trophy.svg
            else
              echo "ERROR: trophy.svg was not generated. Listing SVGs in workspace:"
              find . -maxdepth 3 -name "*.svg"
              exit 1
            fi
          fi
          echo "Final contents of dist:"
          ls -la dist

      - name: Push all SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
